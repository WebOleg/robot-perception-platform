name: CI

# Run on every push to a branch and on every PR into main.
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify domain structure exists
        run: |
          for dir in robot bridge services web infra docs; do
            if [ ! -d "$dir" ]; then
              echo "::error::Missing required domain directory: $dir"
              exit 1
            fi
          done
          echo "All domain directories present."

      - name: Ensure no committed secrets (.env)
        run: |
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "::error::A .env file is committed. Secrets must never be in git."
            exit 1
          fi
          echo "No committed .env files. Good."

      - name: Validate YAML files
        run: |
          python3 -c "import yaml, sys, glob
          files = glob.glob('**/*.yml', recursive=True) + glob.glob('**/*.yaml', recursive=True)
          for f in files:
              with open(f) as fh:
                  yaml.safe_load(fh)
              print('OK:', f)
          print('All YAML valid.')"
