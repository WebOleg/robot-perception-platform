# Orchestrates the whole platform. Grows service by service.
# Principle #6: everything containerized, started with one command.
# Principle #5: secrets come from .env, never hardcoded here.

services:
  db:
    image: postgres:16-alpine
    container_name: rpp-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: ./services/api
    container_name: rpp-api
    ports:
      - "8080:8080"
    environment:
      API_PORT: 8080
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # World A — robot domain. Runs the perception nodes (demo: heartbeat + listener).
  robot:
    build: ./robot
    container_name: rpp-robot
    command: ros2 launch perception demo.launch.py
    restart: unless-stopped

volumes:
  db-data:
