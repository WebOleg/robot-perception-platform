services:
  db:
    image: postgres:16-alpine
    container_name: rpp-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: ./services/api
    container_name: rpp-api
    ports:
      - "8080:8080"
    environment:
      API_PORT: 8080
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  robot:
    build: ./robot
    container_name: rpp-robot
    command: ros2 launch perception perception.launch.py
    environment:
      ROS_DOMAIN_ID: 0
    restart: unless-stopped

  bridge:
    build: ./bridge
    container_name: rpp-bridge
    command: ros2 run bridge_node bridge
    environment:
      ROS_DOMAIN_ID: 0
      BRIDGE_TARGET_URL: http://api:8080
    depends_on:
      - api
      - robot
    restart: unless-stopped

  # Gazebo simulation. Heavy; runs ONLY when explicitly requested:
  #   docker compose --profile sim up sim
  # Publishes camera frames to the /camera ROS2 topic.
  sim:
    build: ./robot/sim
    container_name: rpp-sim
    profiles: ["sim"]
    environment:
      ROS_DOMAIN_ID: 0
    restart: "no"

volumes:
  db-data:
